            *{
                margin : 0;
                padding : 0;
            }
            .nav ul li{
                list-style-type : none;
                float : left;
                width : 120px;
                height : 30px;
                line-height : 30px;
                background-color : rgba(0,0,0,0.8);
                color : white;
            }

            .nav ul li:hover{
                background-color : rgba(255,140,0,0.8);
                color : black;
            }

            .nav ul li ul{
                display : none;
            }
            
            .nav ul li:hover > ul{
                display : block;
            }

            .nav ul li ul li{
                display : inline-block;
                position : relative;
            }

            .nav ul li ul li ul{
                position : absolute;
                left : 120px;
                top : 0;
            }

        </style>
